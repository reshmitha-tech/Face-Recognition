<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Face Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 24px 40px;
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.95), rgba(15, 15, 30, 0.98));
            border-bottom: 1px solid rgba(100, 120, 255, 0.15);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        header p {
            font-size: 13px;
            color: #6b7280;
            margin-left: auto;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 960px;
        }

        .video-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(99, 102, 241, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(99, 102, 241, 0.08);
            background: #111118;
        }

        .video-container::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 17px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
        }

        .video-feed {
            display: block;
            width: 100%;
            max-width: 860px;
            border-radius: 16px;
        }

        .video-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.25);
            z-index: 3;
        }

        .info-bar {
            margin-top: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.8), rgba(15, 15, 28, 0.9));
            border: 1px solid rgba(100, 120, 255, 0.1);
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            min-width: 160px;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.1);
        }

        .info-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .info-card .value {
            font-size: 16px;
            font-weight: 600;
            color: #c7d2fe;
        }

        .keyboard-hint {
            margin-top: 32px;
            font-size: 13px;
            color: #4b5563;
        }

        kbd {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(100, 120, 255, 0.15);
            border-radius: 6px;
            padding: 3px 8px;
            font-family: 'Inter', monospace;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon">👁</div>
        <h1>Real-Time Face Recognition</h1>
        <p><span class="status-dot"></span>Live Feed Active</p>
    </header>

    <main>
        <div class="video-container">
            <span class="video-label">📷 Webcam — Live</span>
            <img src="/video_feed" alt="Live Face Recognition Feed" class="video-feed" id="videoFeed">
        </div>

        <div class="info-bar">
            <div class="info-card">
                <div class="label">Model</div>
                <div class="value">Keras CNN</div>
            </div>
            <div class="info-card">
                <div class="label">Classes</div>
                <div class="value">{{ num_classes }}</div>
            </div>
            <div class="info-card">
                <div class="label">Input Size</div>
                <div class="value">224 × 224</div>
            </div>
            <div class="info-card">
                <div class="label">Detection</div>
                <div class="value">Haar Cascade</div>
            </div>
        </div>

        <p class="keyboard-hint">Open <kbd>http://localhost:5000</kbd> in your browser</p>
    </main>
</body>
</html>
